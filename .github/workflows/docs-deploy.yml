name: "docs: Deploy (Bulletin + Pages)"

on:
    workflow_run:
        workflows: ["product-sdk: Release"]
        types: [completed]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: docs-deploy
    cancel-in-progress: false

jobs:
    deploy:
        if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.pages-deploy.outputs.page_url }}
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Check for umbrella tag at HEAD
              id: gate
              run: |
                  if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                    echo "skip=false" >> $GITHUB_OUTPUT
                    exit 0
                  fi
                  tag=$(git tag --points-at HEAD | grep -E '^@parity/product-sdk@[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)
                  if [ -z "$tag" ]; then
                    echo "skip=true" >> $GITHUB_OUTPUT
                  else
                    echo "skip=false" >> $GITHUB_OUTPUT
                    echo "tag=$tag" >> $GITHUB_OUTPUT
                  fi

            - if: steps.gate.outputs.skip != 'true'
              uses: pnpm/action-setup@v4
              with:
                  version: 10

            - if: steps.gate.outputs.skip != 'true'
              uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: "pnpm"
                  cache-dependency-path: |
                      product-sdk/pnpm-lock.yaml
                      docs/pnpm-lock.yaml

            - name: Install SDK deps
              if: steps.gate.outputs.skip != 'true'
              working-directory: product-sdk
              run: pnpm install --frozen-lockfile

            - name: Build SDK packages
              if: steps.gate.outputs.skip != 'true'
              working-directory: product-sdk
              run: pnpm build

            - name: Install docs deps
              if: steps.gate.outputs.skip != 'true'
              working-directory: docs
              run: pnpm install --frozen-lockfile

            - name: Generate API Reference docs
              if: steps.gate.outputs.skip != 'true'
              working-directory: docs
              run: pnpm docs:generate

            - name: Build static site
              if: steps.gate.outputs.skip != 'true'
              working-directory: docs
              run: pnpm build

            - name: Install bulletin-deploy
              if: steps.gate.outputs.skip != 'true'
              run: npm install -g bulletin-deploy

            - name: Deploy to Bulletin Chain
              if: steps.gate.outputs.skip != 'true'
              uses: nick-fields/retry@v3
              with:
                  timeout_minutes: 10
                  max_attempts: 3
                  command: cd docs && bulletin-deploy ./out product-sdk.dot --js-merkle

            - name: Rebuild static site for GitHub Pages
              if: steps.gate.outputs.skip != 'true'
              working-directory: docs
              env:
                  PAGES_BASE_PATH: /${{ github.event.repository.name }}
              run: pnpm build

            - name: Configure GitHub Pages
              if: steps.gate.outputs.skip != 'true'
              uses: actions/configure-pages@v5

            - name: Upload Pages artifact
              if: steps.gate.outputs.skip != 'true'
              uses: actions/upload-pages-artifact@v3
              with:
                  path: docs/out

            - name: Deploy to GitHub Pages
              id: pages-deploy
              if: steps.gate.outputs.skip != 'true'
              uses: actions/deploy-pages@v4

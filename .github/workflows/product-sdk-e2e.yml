name: "product-sdk: E2E Tests"

on:
  push:
    branches: [main]
    paths:
      - "product-sdk/**"
      - ".github/workflows/product-sdk-e2e.yml"
  pull_request:
    branches: [main]
    paths:
      - "product-sdk/**"
      - ".github/workflows/product-sdk-e2e.yml"

defaults:
  run:
    working-directory: product-sdk

jobs:
  e2e:
    name: "E2E Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: product-sdk/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: pnpm --filter "@parity/product-sdk-host-demo" exec playwright install --with-deps chromium

      - name: Build packages
        run: pnpm build

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: product-sdk/examples/*/playwright-report/
          retention-days: 7

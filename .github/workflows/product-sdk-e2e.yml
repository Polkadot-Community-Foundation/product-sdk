name: "product-sdk: E2E Tests"

on:
  push:
    branches: [main]
    paths:
      - "product-sdk/**"
      - ".github/workflows/product-sdk-e2e.yml"
  pull_request:
    branches: [main]
    paths:
      - "product-sdk/**"
      - ".github/workflows/product-sdk-e2e.yml"

# Read-only test pipeline: only needs to clone the repo. Artifact uploads use
# the ephemeral run-scoped token and don't need extra permissions.
permissions:
  contents: read

# Cancel in-flight runs on the same PR / ref so a quick succession of pushes
# doesn't queue a backlog of redundant E2E runs (each takes ~30min).
concurrency:
  group: product-sdk-e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: product-sdk

jobs:
  e2e:
    name: "E2E Tests"
    runs-on: parity-default
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: product-sdk/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: pnpm --filter "@parity/product-sdk-host-demo" exec playwright install --with-deps chromium

      - name: Build packages
        run: pnpm build

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright Report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: playwright-report
          path: product-sdk/examples/*/playwright-report/
          retention-days: 7
